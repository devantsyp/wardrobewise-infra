{% extends "base.html" %} {% block title %}WardrobeWise — Make Laundry a
No-Brainer{% endblock %} {% block content %}
<section class="py-28 px-4">
  <div class="max-w-3xl mx-auto text-center">
    <h1 class="text-4xl font-bold text-secondary-900 leading-tight mb-10">
      Ready to make laundry a no-brainer?
    </h1>
    {% if user.is_authenticated %}
    <a
      href="/wardrobe/"
      class="inline-block bg-primary-700 hover:bg-accent-light-400 text-white font-semibold py-3 px-8 rounded-lg text-lg transition-colors"
    >
      Go to Your Wardrobe
    </a>
    {% else %}
    <a
      href="/register/"
      class="inline-block bg-primary-700 hover:bg-accent-light-400 text-white font-semibold py-3 px-8 rounded-lg text-lg transition-colors"
    >
      Get Started
    </a>
    {% endif %}
  </div>
</section>
{% endblock %}
