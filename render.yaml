databases:
  - name: wardrobe-wise-db
    plan: free
    databaseName: wardrobe-wise
    user: wardrobe-wise

services:
  - type: web
    name: wardrobe-wise
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn laundry_advisor.wsgi:application"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: laundry_advisor.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wardrobe-wise-db
          property: connectionString
      - key: RENDER_EXTERNAL_HOSTNAME
        fromService:
          type: web
          name: wardrobe-wise
          property: host
      - key: OPENAI_API_KEY
        sync: false
